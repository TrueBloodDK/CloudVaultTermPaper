{% extends "base/layout.html" %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">⬡</div>
      <h1 class="auth-title">SecureVault</h1>
      <p class="auth-subtitle">Защищённое хранилище организации</p>
    </div>

    {% if error %}
    <div class="form-error-banner">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'auth:login' %}" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="user@company.ru"
          value="{{ email|default:'' }}"
          required
          autofocus
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Пароль</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••••"
          required
        >
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        Войти
      </button>
    </form>

    <div class="auth-footer">
      Нет аккаунта?
      <a href="{% url 'auth:register' %}">Зарегистрироваться</a>
    </div>

  </div>
  <div class="auth-decor">
    <div class="decor-line"></div>
    <div class="decor-label">AES-256 · JWT · TLS 1.3</div>
    <div class="decor-line"></div>
  </div>
</div>
{% endblock %}
